version: "3.8"

services:
  access-gate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: access-gate-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Các biến từ .env sẽ được nạp, nhưng có thể ghi đè hoặc bổ sung ở đây
      - CORE_SERVICE_URL=${CORE_SERVICE_URL}
      - CORE_REQUEST_TIMEOUT=${CORE_REQUEST_TIMEOUT}
    volumes:
      # Mount file whitelist để có thể cập nhật mà không rebuild (tuỳ chọn)
      - ./uid_whitelist.csv:/app/uid_whitelist.csv:ro
      # Mount thư mục src nếu muốn code nóng (chỉ dùng dev, không dùng cho prod)
      # - ./src:/app/src
    restart: unless-stopped
    networks:
      - team-internal
      # - class-net

networks:
  team-internal:
    driver: bridge
  # class-net:
  #   external: true