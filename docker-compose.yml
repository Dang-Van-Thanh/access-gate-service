version: "3.8"

services:
  access-gate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: access-gate-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORE_SERVICE_URL=${CORE_SERVICE_URL}
      - CORE_REQUEST_TIMEOUT=${CORE_REQUEST_TIMEOUT}
      - DATABASE_URL=postgresql://access_user:access_pass@postgres:5432/access_db
    volumes:
      - ./uid_whitelist.csv:/app/uid_whitelist.csv:ro
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - team-internal
      - class-net

  postgres:
    image: postgres:15-alpine
    container_name: access-db
    environment:
      POSTGRES_USER: access_user
      POSTGRES_PASSWORD: access_pass
      POSTGRES_DB: access_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - team-internal

volumes:
  postgres_data:

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true